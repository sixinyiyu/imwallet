name: Build Server (PM2)

on:
  push:
    tags:
      - "server-pm2-v*"
    paths:
      - "apps/server/**"
      - ".github/workflows/build-server-pm2.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma@6 generate
        working-directory: apps/server

      - name: Build TypeScript
        run: npm run build
        working-directory: apps/server

      - name: Install production dependencies (standalone, no workspace hoisting)
        run: |
          mkdir -p /tmp/prod-install
          cp apps/server/package.json /tmp/prod-install/
          cp -r apps/server/prisma /tmp/prod-install/prisma
          cd /tmp/prod-install
          npm install --omit=dev
          npx prisma@6 generate

      - name: Verify production dependencies
        run: |
          echo "Checking critical modules..."
          test -d "/tmp/prod-install/node_modules/express" || { echo "❌ express missing"; exit 1; }
          test -d "/tmp/prod-install/node_modules/bcryptjs" || { echo "❌ bcryptjs missing"; exit 1; }
          test -d "/tmp/prod-install/node_modules/.prisma/client" || { echo "❌ .prisma/client missing"; exit 1; }
          test -f "apps/server/prisma/init.sql" || { echo "❌ prisma/init.sql missing"; exit 1; }
          echo "✅ All production dependencies verified"

      - name: Package release artifact
        run: |
          VERSION="${GITHUB_REF_NAME#server-pm2-v}"
          mkdir -p /tmp/imwallet-server
          
          cp -r apps/server/dist /tmp/imwallet-server/dist
          cp -r /tmp/prod-install/node_modules /tmp/imwallet-server/node_modules
          cp -r apps/server/prisma /tmp/imwallet-server/prisma
          cp apps/server/package.json /tmp/imwallet-server/package.json
          cp apps/server/.env.example /tmp/imwallet-server/.env.example
          cp apps/server/ecosystem.config.js /tmp/imwallet-server/ecosystem.config.js
          cp apps/server/deploy-pm2.sh /tmp/imwallet-server/deploy-pm2.sh
          
          # Ensure shell scripts have Unix line endings (LF)
          sed -i 's/\r$//' /tmp/imwallet-server/deploy-pm2.sh
          
          cd /tmp
          tar -czf imwallet-server-pm2-${VERSION}.tar.gz imwallet-server/
          cp /tmp/imwallet-server-pm2-${VERSION}.tar.gz $GITHUB_WORKSPACE/
          echo "✅ Packaged: imwallet-server-pm2-${VERSION}.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: IMWallet Server (PM2) ${{ github.ref_name }}
          files: imwallet-server-pm2-*.tar.gz
          generate_release_notes: true