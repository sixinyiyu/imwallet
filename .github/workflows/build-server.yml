name: Build Server (Systemd)

on:
  push:
    tags:
      - "server-v*"
    paths:
      - "apps/server/**"
      - ".github/workflows/build-server.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client (all platforms)
        run: npx prisma@6 generate
        working-directory: apps/server

      - name: Build TypeScript
        run: npm run build
        working-directory: apps/server

      - name: Install production dependencies (standalone, no workspace hoisting)
        run: |
          mkdir -p /tmp/prod-install
          cp apps/server/package.json /tmp/prod-install/
          cp -r apps/server/prisma /tmp/prod-install/prisma
          cd /tmp/prod-install
          npm install --omit=dev
          # Overwrite Prisma client with pre-generated version (includes all platform engines)
          # npm workspaces hoist @prisma/client to root, so the generated client is there
          cp -r $GITHUB_WORKSPACE/node_modules/.prisma/client node_modules/.prisma/client

      - name: Prune node_modules
        run: |
          cd /tmp/prod-install/node_modules

          # Remove build cache (npm cache, not needed at runtime)
          rm -rf .cache
          # Remove Prisma CLI (dev tool, not needed at runtime)
          rm -rf prisma
          # Remove TypeScript compiler (dev tool, not needed at runtime)
          rm -rf typescript
          # Remove @prisma/engines package (76MB, contains all platform engines)
          # The actual query engine is in .prisma/client after overwrite, this package is redundant
          rm -rf @prisma/engines
          # Remove migration and introspection engines (not needed at runtime)
          rm -rf .prisma/client/migration-engine-*
          rm -rf .prisma/client/introspection-engine-*
          # Remove schema.prisma from client (already in prisma/ directory)
          rm -f .prisma/client/schema.prisma
          # Remove non-PostgreSQL wasm-base64 engines (42MB, we only use PostgreSQL)
          find @prisma/client/runtime -type f -name '*cockroachdb*' -delete 2>/dev/null || true
          find @prisma/client/runtime -type f -name '*mysql*' -delete 2>/dev/null || true
          find @prisma/client/runtime -type f -name '*sqlserver*' -delete 2>/dev/null || true
          find @prisma/client/runtime -type f -name '*sqlite*' -delete 2>/dev/null || true

          # Strip common bloat from all packages
          find . -type f -name "README*" -delete 2>/dev/null || true
          find . -type f -name "CHANGELOG*" -delete 2>/dev/null || true
          find . -type f -name "LICENSE*" -delete 2>/dev/null || true
          find . -type f -name "*.md" -not -path "*/.prisma/*" -delete 2>/dev/null || true
          find . -type d -name "test" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "tests" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "__tests__" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name ".github" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "docs" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "example" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "examples" -exec rm -rf {} + 2>/dev/null || true

          # Remove TypeScript source maps and declarations (not needed at runtime)
          find . -type f -name "*.ts" -delete 2>/dev/null || true
          find . -type f -name "*.d.ts" -not -path "*/.prisma/*" -delete 2>/dev/null || true
          find . -type f -name "*.js.map" -delete 2>/dev/null || true

          echo "✅ node_modules pruned"
          du -sh .

      - name: Verify production dependencies
        run: |
          echo "Checking critical modules..."
          test -d "/tmp/prod-install/node_modules/express" || { echo "❌ express missing"; exit 1; }
          test -d "/tmp/prod-install/node_modules/bcryptjs" || { echo "❌ bcryptjs missing"; exit 1; }
          test -d "/tmp/prod-install/node_modules/.prisma/client" || { echo "❌ .prisma/client missing"; exit 1; }
          test -f "apps/server/prisma/init.sql" || { echo "❌ prisma/init.sql missing"; exit 1; }
          echo "✅ All production dependencies verified"

      - name: Package platform-specific artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#server-v}"

          # Prepare base files (common to all platforms)
          BASE=/tmp/pkg-base
          mkdir -p $BASE
          cp -r apps/server/dist $BASE/dist
          cp -r apps/server/prisma $BASE/prisma
          cp apps/server/package.json $BASE/package.json
          # Use standalone install's lock file (not workspace root's), matches the bundled node_modules
          cp /tmp/prod-install/package-lock.json $BASE/package-lock.json
          cp apps/server/.env.example $BASE/.env.example
          cp apps/server/imwallet.service $BASE/imwallet.service
          cp apps/server/setup-ec2.sh $BASE/setup-ec2.sh
          cp apps/server/deploy.sh $BASE/deploy.sh

          # Ensure shell scripts have Unix line endings (LF)
          sed -i 's/\r$//' $BASE/deploy.sh $BASE/setup-ec2.sh

          # Create platform-specific packages
          for PLATFORM in debian rhel windows; do
            PKG=/tmp/imwallet-server-$PLATFORM
            mkdir -p $PKG
            cp -r $BASE/* $PKG/
            cp -r /tmp/prod-install/node_modules $PKG/node_modules

            # Remove irrelevant Prisma query engines (keep only target platform)
            case $PLATFORM in
              debian)
                rm -f $PKG/node_modules/.prisma/client/libquery_engine-rhel-openssl-3.0.x.so.node
                rm -f $PKG/node_modules/.prisma/client/query_engine-windows.dll.node
                ;;
              rhel)
                rm -f $PKG/node_modules/.prisma/client/libquery_engine-debian-openssl-3.0.x.so.node
                rm -f $PKG/node_modules/.prisma/client/query_engine-windows.dll.node
                ;;
              windows)
                rm -f $PKG/node_modules/.prisma/client/libquery_engine-debian-openssl-3.0.x.so.node
                rm -f $PKG/node_modules/.prisma/client/libquery_engine-rhel-openssl-3.0.x.so.node
                ;;
            esac

            cd /tmp
            tar -czf imwallet-server-systemd-${VERSION}-${PLATFORM}.tar.gz imwallet-server-$PLATFORM/
            SIZE=$(du -sh imwallet-server-systemd-${VERSION}-${PLATFORM}.tar.gz | cut -f1)
            cp imwallet-server-systemd-${VERSION}-${PLATFORM}.tar.gz $GITHUB_WORKSPACE/
            echo "✅ Packaged: imwallet-server-systemd-${VERSION}-${PLATFORM}.tar.gz (size: $SIZE)"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: IMWallet Server (Systemd) ${{ github.ref_name }}
          files: imwallet-server-systemd-*.tar.gz
          generate_release_notes: true