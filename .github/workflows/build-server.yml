name: Build Server Docker

on:
  push:
    tags:
      - "server-v*"
    paths:
      - "apps/server/**"
      - ".github/workflows/build-server.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/imwallet-server
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=
            latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate deployment .env template
        run: |
          cat > .env.production.template << 'EOF'
          # IMWallet Server - Production Environment Variables
          # Copy this file to your EC2 instance and fill in the values
          # Then run: docker run --env-file .env.production -p 3000:3000 ghcr.io/sixinyiyu/imwallet/imwallet-server:latest

          PORT=3000
          NODE_ENV=production

          # Database (AWS RDS PostgreSQL)
          DATABASE_URL=postgresql://USER:PASSWORD@RDS_ENDPOINT:5432/DATABASE_NAME

          # JWT
          JWT_SECRET=CHANGE_ME_TO_A_STRONG_SECRET
          JWT_EXPIRES_IN=7d

          # Fee
          FEE_RATE=0.005
          FEE_MODE=DEDUCTED
          EOF
          echo "✅ .env.production.template generated"

      - name: Upload deployment template
        uses: actions/upload-artifact@v4
        with:
          name: deployment-env-template
          path: .env.production.template
