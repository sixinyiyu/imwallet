name: Build Server (Systemd)

on:
  push:
    tags:
      - "server-v*"
    paths:
      - "apps/server/**"
      - ".github/workflows/build-server.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma@6 generate
        working-directory: apps/server

      - name: Build TypeScript
        run: npm run build
        working-directory: apps/server

      - name: Install production dependencies (standalone, no workspace hoisting)
        run: |
          mkdir -p /tmp/prod-install
          cp apps/server/package.json /tmp/prod-install/
          cp -r apps/server/prisma /tmp/prod-install/prisma
          cd /tmp/prod-install
          npm install --omit=dev
          npx prisma@6 generate

      - name: Prune node_modules to reduce package size
        run: |
          cd /tmp/prod-install/node_modules

          # 1. Remove Prisma engines for non-Linux platforms (keep only linux-musl for Alpine, linux for glibc)
          #    .prisma/client/engines contains: query-engine + migration-engine + introspection-engine
          #    Production only needs query-engine
          rm -rf .prisma/client/schema.prisma
          rm -rf .prisma/client/migration-engine-debian-*
          rm -rf .prisma/client/introspection-engine-debian-*
          rm -rf .prisma/client/query-engine-windows*
          rm -rf .prisma/client/query-engine-darwin*
          rm -rf .prisma/client/libquery_engine-windows*
          rm -rf .prisma/client/libquery_engine-darwin*
          rm -rf .prisma/client/libquery_engine-debian-*
          # Keep only: libquery_engine-linux-musl.so (for Alpine) or libquery_engine-linux.so (for glibc)
          # Also remove migration and introspection engines (not needed at runtime)
          rm -rf .prisma/client/migration-engine-*
          rm -rf .prisma/client/introspection-engine-*

          # 2. Remove prisma CLI (dev tool, not needed at runtime)
          rm -rf prisma

          # 3. Strip common bloat from all packages
          find . -type f -name "README*" -delete 2>/dev/null || true
          find . -type f -name "CHANGELOG*" -delete 2>/dev/null || true
          find . -type f -name "LICENSE*" -delete 2>/dev/null || true
          find . -type f -name "*.md" -not -path "*/.prisma/*" -delete 2>/dev/null || true
          find . -type d -name "test" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "tests" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "__tests__" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name ".github" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "docs" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "example" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "examples" -exec rm -rf {} + 2>/dev/null || true

          # 4. Remove TypeScript source maps and declarations (not needed at runtime)
          find . -type f -name "*.ts" -delete 2>/dev/null || true
          find . -type f -name "*.d.ts" -not -path "*/.prisma/*" -delete 2>/dev/null || true
          find . -type f -name "*.js.map" -delete 2>/dev/null || true

          echo "✅ node_modules pruned"
          du -sh .

      - name: Verify production dependencies
        run: |
          echo "Checking critical modules..."
          test -d "/tmp/prod-install/node_modules/express" || { echo "❌ express missing"; exit 1; }
          test -d "/tmp/prod-install/node_modules/bcryptjs" || { echo "❌ bcryptjs missing"; exit 1; }
          test -d "/tmp/prod-install/node_modules/.prisma/client" || { echo "❌ .prisma/client missing"; exit 1; }
          test -f "apps/server/prisma/init.sql" || { echo "❌ prisma/init.sql missing"; exit 1; }
          echo "✅ All production dependencies verified"

      - name: Package release artifact
        run: |
          VERSION="${GITHUB_REF_NAME#server-v}"
          mkdir -p /tmp/imwallet-server
          
          cp -r apps/server/dist /tmp/imwallet-server/dist
          cp -r /tmp/prod-install/node_modules /tmp/imwallet-server/node_modules
          cp -r apps/server/prisma /tmp/imwallet-server/prisma
          cp apps/server/package.json /tmp/imwallet-server/package.json
          cp apps/server/.env.example /tmp/imwallet-server/.env.example
          cp apps/server/imwallet.service /tmp/imwallet-server/imwallet.service
          cp apps/server/setup-ec2.sh /tmp/imwallet-server/setup-ec2.sh
          cp apps/server/deploy.sh /tmp/imwallet-server/deploy.sh
          
          # Ensure shell scripts have Unix line endings (LF)
          sed -i 's/\r$//' /tmp/imwallet-server/deploy.sh /tmp/imwallet-server/setup-ec2.sh
          
          cd /tmp
          tar -czf imwallet-server-systemd-${VERSION}.tar.gz imwallet-server/
          SIZE=$(du -sh imwallet-server-systemd-${VERSION}.tar.gz | cut -f1)
          cp /tmp/imwallet-server-systemd-${VERSION}.tar.gz $GITHUB_WORKSPACE/
          echo "✅ Packaged: imwallet-server-systemd-${VERSION}.tar.gz (size: $SIZE)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: IMWallet Server (Systemd) ${{ github.ref_name }}
          files: imwallet-server-systemd-*.tar.gz
          generate_release_notes: true
