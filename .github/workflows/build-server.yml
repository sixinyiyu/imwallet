name: Build Server

on:
  push:
    tags:
      - "server-v*"
    paths:
      - "apps/server/**"
      - ".github/workflows/build-server.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/server

      - name: Build TypeScript
        run: npm run build
        working-directory: apps/server

      - name: Package release artifact
        run: |
          VERSION="${GITHUB_REF_NAME#server-v}"
          mkdir -p /tmp/imwallet-server
          
          # Copy compiled JS
          cp -r apps/server/dist /tmp/imwallet-server/dist
          
          # Copy production node_modules (prisma client included)
          cp -r apps/server/node_modules /tmp/imwallet-server/node_modules
          
          # Copy prisma schema (for migrations on server)
          cp -r apps/server/prisma /tmp/imwallet-server/prisma
          
          # Copy package.json
          cp apps/server/package.json /tmp/imwallet-server/package.json
          
          # Copy .env.example as reference
          cp apps/server/.env.example /tmp/imwallet-server/.env.example
          
          # Create tarball
          cd /tmp
          tar -czf imwallet-server-${VERSION}.tar.gz imwallet-server/
          
          # Move to workspace
          cp /tmp/imwallet-server-${VERSION}.tar.gz $GITHUB_WORKSPACE/
          echo "✅ Packaged: imwallet-server-${VERSION}.tar.gz"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-build
          path: imwallet-server-*.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: IMWallet Server ${{ github.ref_name }}
          files: imwallet-server-*.tar.gz
          generate_release_notes: true
