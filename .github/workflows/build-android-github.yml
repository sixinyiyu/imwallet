name: Build Android (GitHub Actions)

on:
  push:
    branches: [main]
    paths: ['apps/mobile/**', 'package.json', 'package-lock.json']

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: check
        run: |
          OLD_VERSION=$(git show HEAD~1:apps/mobile/package.json 2>/dev/null | jq -r '.version' || echo "0.0.0")
          NEW_VERSION=$(jq -r '.version' apps/mobile/package.json)
          if [ "$OLD_VERSION" != "$NEW_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ Version changed: $OLD_VERSION → $NEW_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️ Version unchanged ($NEW_VERSION), skip build"
          fi

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(jq -r '.version' apps/mobile/package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "✅ Version: $VERSION"

  build:
    needs: prepare
    if: needs.prepare.outputs.changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm ci

      - name: Expo prebuild (generate native Android project)
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean
        env:
          BUILD_ABI: ${{ matrix.abi }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}

      - name: Verify prebuild output
        working-directory: apps/mobile
        run: |
          echo "📋 Checking generated Android project..."
          if [ -d "android" ]; then
            echo "✅ android directory exists"
            ls -la android/
            echo "📋 gradle.properties:"
            cat android/gradle.properties
            echo ""
            echo "📋 app/build.gradle (signingConfigs section):"
            grep -A 20 "signingConfigs" android/app/build.gradle || echo "No signingConfigs found"
          else
            echo "❌ android directory NOT found - prebuild failed!"
            exit 1
          fi

      - name: Setup Android signing
        working-directory: apps/mobile/android
        run: |
          # 1. Decode keystore from GitHub Secrets (Base64 encoded)
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore
          echo "✅ Keystore decoded: $(ls -la app/release.keystore)"

          # 2. Create keystore.properties in android root
          cat > keystore.properties << PROPSEOF
          storeFile=release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          PROPSEOF
          echo "✅ keystore.properties created"

          # 3. Inject signing config into app/build.gradle using Python script
          python3 $GITHUB_WORKSPACE/scripts/inject_signing.py

          # 4. Verify the modifications
          echo "📋 Verifying signing config in build.gradle:"
          grep -A 10 "signingConfigs" app/build.gradle || echo "⚠️ No signingConfigs found"
          echo ""
          grep "signingConfig signingConfigs" app/build.gradle || echo "⚠️ No signingConfig reference found"

      - name: Build APK with Gradle
        working-directory: apps/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
        env:
          BUILD_ABI: ${{ matrix.abi }}

      - name: Prepare APK for release
        working-directory: apps/mobile
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)

          if [ -z "$APK_PATH" ]; then
            echo "❌ APK not found!"
            echo "📋 Listing all build outputs:"
            find android/app/build/outputs -type f
            exit 1
          fi

          mkdir -p dist
          cp "$APK_PATH" "dist/imwallet-${VERSION}-${{ matrix.abi }}.apk"
          echo "✅ APK prepared: imwallet-${VERSION}-${{ matrix.abi }}.apk"
          ls -la dist/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}
          path: apps/mobile/dist/*.apk

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: android-*

      - name: Create tag and GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-github-v${{ needs.prepare.outputs.version }}
          name: IMWallet v${{ needs.prepare.outputs.version }}
          files: release-artifacts/**/*.apk
          generate_release_notes: true
