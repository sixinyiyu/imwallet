name: Build Android

on:
  push:
    tags:
      - "mobile-v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            profile: production-arm64
          # - abi: armeabi-v7a
          #   profile: production-armv7
          # - abi: x86
          #   profile: production-x86
          # - abi: x86_64
          #   profile: production-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        run: npm install -g eas-cli

      - name: Initialize EAS project
        run: eas init --id ${{ secrets.EAS_PROJECT_ID }} --force
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Inject env vars and commit for EAS
        run: |
          cd apps/mobile
          # Inject API_BASE_URL and EAS_PROJECT_ID into all production profiles
          node -e "
            const fs = require('fs');
            const eas = JSON.parse(fs.readFileSync('eas.json', 'utf8'));
            const profiles = ['production-arm64', 'production-armv7', 'production-x86', 'production-x86_64'];
            for (const p of profiles) {
              if (eas.build[p]) {
                eas.build[p].env.API_BASE_URL = process.env.API_BASE_URL;
                eas.build[p].env.EAS_PROJECT_ID = process.env.EAS_PROJECT_ID;
              }
            }
            fs.writeFileSync('eas.json', JSON.stringify(eas, null, 2) + '\n');
          "
          # Verify injection - print configured server URL
          echo "📋 Verifying eas.json injection:"
          node -e "const e=JSON.parse(require('fs').readFileSync('eas.json','utf8'));const u=e.build['production-arm64'].env.API_BASE_URL||'';console.log('  API_BASE_URL:',u);console.log('  EAS_PROJECT_ID set:',!!e.build['production-arm64'].env.EAS_PROJECT_ID)"
          # EAS build uses git state, so we must commit the changes locally
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add eas.json
          git commit -m "chore: inject env vars for EAS build" --allow-empty
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}

      - name: Build Android (EAS) - ${{ matrix.abi }}
        run: |
          eas build \
            --platform android \
            --profile ${{ matrix.profile }} \
            --non-interactive \
            --clear-cache
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_NO_EXPO_GO_WARNING: true

      - name: Download APK from EAS
        run: |
          mkdir -p dist
          BUILD_INFO=$(eas build:list --platform android --limit 10 --json)
          BUILD_URL=$(echo "$BUILD_INFO" | node -e "
            const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const build = data.find(b => b.buildProfile === '${{ matrix.profile }}');
            const url = build?.artifacts?.buildUrl || '';
            console.log(url);
          ")
          if [ -n "$BUILD_URL" ]; then
            VERSION="${GITHUB_REF_NAME#mobile-v}"
            curl -L -o "dist/imwallet-${VERSION}-${{ matrix.abi }}.apk" "$BUILD_URL"
            echo "✅ APK downloaded: imwallet-${VERSION}-${{ matrix.abi }}.apk"
          else
            echo "⚠️ Could not find APK download URL"
            exit 1
          fi
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}
          path: apps/mobile/dist/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: android-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: IMWallet ${{ github.ref_name }}
          files: release-artifacts/**/*.apk
          generate_release_notes: true