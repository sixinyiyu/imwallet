name: Build Android

on:
  push:
    tags:
      - "mobile-v*"
    paths:
      - "apps/mobile/**"
      - ".github/workflows/build-android.yml"

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        run: npm install -g eas-cli

      - name: Initialize EAS project
        run: eas init
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (EAS)
        run: |
          eas build \
            --platform android \
            --profile production \
            --non-interactive
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_NO_EXPO_GO_WARNING: true

      - name: Download APK from EAS
        run: |
          mkdir -p dist
          BUILD_INFO=$(eas build:list --platform android --limit 1 --json)
          BUILD_URL=$(echo "$BUILD_INFO" | node -e "
            const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const url = data[0]?.artifacts?.buildUrl || '';
            console.log(url);
          ")
          if [ -n "$BUILD_URL" ]; then
            curl -L -o dist/app.apk "$BUILD_URL"
            echo "✅ APK downloaded successfully"
          else
            echo "⚠️ Could not find APK download URL"
          fi
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/mobile/dist/*.apk
        continue-on-error: true
