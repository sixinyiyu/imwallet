name: Build Android

on:
  push:
    tags:
      - "mobile-v*"
    paths:
      - "apps/mobile/**"
      - ".github/workflows/build-android.yml"

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        run: npm install -g eas-cli

      - name: Initialize EAS project
        run: eas init
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (EAS)
        run: |
          eas build \
            --platform android \
            --profile production \
            --non-interactive
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_NO_EXPO_GO_WARNING: true

      - name: Download build artifact from EAS
        run: |
          mkdir -p dist
          BUILD_INFO=$(eas build:list --platform android --limit 1 --json)
          BUILD_URL=$(echo "$BUILD_INFO" | node -e "
            const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const url = data[0]?.artifacts?.buildUrl || '';
            console.log(url);
          ")
          if [ -n "$BUILD_URL" ]; then
            VERSION="${GITHUB_REF_NAME#mobile-v}"
            curl -L -o "dist/imwallet-${VERSION}.aab" "$BUILD_URL"
            echo "✅ AAB downloaded successfully: imwallet-${VERSION}.aab"
          else
            echo "⚠️ Could not find build artifact download URL"
          fi
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: apps/mobile/dist/*.aab
        continue-on-error: true

      - name: Create GitHub Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          name: IMWallet ${{ github.ref_name }}
          files: apps/mobile/dist/*.aab
          generate_release_notes: true
