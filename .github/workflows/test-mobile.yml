name: Test Mobile

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - ".github/workflows/test-mobile.yml"
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - ".github/workflows/test-mobile.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
        working-directory: apps/mobile

      - name: Run tests
        run: npx jest --passWithNoTests --verbose
        working-directory: apps/mobile
        continue-on-error: true
