name: Build iOS

on:
  push:
    tags:
      - "ios-v*"
    paths:
      - "apps/mobile/**"
      - ".github/workflows/build-ios.yml"

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        run: npm install -g eas-cli

      - name: Initialize EAS project
        run: eas init --id ${{ secrets.EAS_PROJECT_ID }} --force
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS (EAS)
        run: |
          eas build \
            --platform ios \
            --profile production \
            --non-interactive
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_NO_EXPO_GO_WARNING: true
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Download IPA from EAS
        working-directory: apps/mobile
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#ios-v}"

          MAX_RETRIES=6
          BUILD_URL=""

          for i in $(seq 1 $MAX_RETRIES); do
            echo "🔄 Attempt $i/$MAX_RETRIES: querying EAS build list..."
            BUILD_INFO=$(eas build:list --platform ios --limit 20 --json 2>/dev/null)

            # Debug: print raw JSON structure
            echo "📋 Raw EAS build list JSON:"
            echo "$BUILD_INFO" | node -e "
              const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              // Print summary of each build for debugging
              data.forEach((b, idx) => {
                console.log(\`  [\${idx}] id=\${b.id}, status=\${b.status}, platform=\${b.platform}, profile=\${b.buildProfile || b.build_profile || 'N/A'}, hasUrl=\${!!(b.artifacts?.buildUrl || b.artifacts?.build_url)}\`);
              });
            " 2>/dev/null || echo "  (failed to parse JSON, raw output:)" && echo "$BUILD_INFO" | head -c 3000

            echo ""

            # Flexible matching: find first finished iOS build with a download URL
            # Don't strictly filter by buildProfile — field name may vary across EAS versions
            BUILD_URL=$(echo "$BUILD_INFO" | node -e "
              const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              const build = data.find(b => {
                const status = (b.status || '').toLowerCase();
                const platform = (b.platform || '').toLowerCase();
                const url = b.artifacts?.buildUrl || b.artifacts?.build_url || '';
                return status === 'finished' && platform === 'ios' && url.length > 0;
              });
              console.log(build?.artifacts?.buildUrl || build?.artifacts?.build_url || '');
            " 2>/dev/null)

            if [ -n "$BUILD_URL" ]; then
              echo "✅ Found IPA download URL: $BUILD_URL"
              break
            fi

            echo "⚠️ No finished build with URL found yet, retrying in 30s..."
            sleep 30
          done

          if [ -z "$BUILD_URL" ]; then
            echo "❌ Could not find IPA download URL after $MAX_RETRIES attempts"
            echo "📋 Full raw build list for debugging:"
            eas build:list --platform ios --limit 20 --json 2>&1
            exit 1
          fi

          curl -L -o "dist/imwallet-${VERSION}.ipa" "$BUILD_URL"
          echo "✅ IPA downloaded: imwallet-${VERSION}.ipa"
          ls -la dist/
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-production
          path: apps/mobile/dist/*.ipa

  release:
    needs: build-ios
    runs-on: ubuntu-latest

    steps:
      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-production
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: IMWallet ${{ github.ref_name }}
          files: release-artifacts/**/*.ipa
          generate_release_notes: true
