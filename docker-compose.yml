version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: imwallet-db
    environment:
      POSTGRES_USER: imwallet
      POSTGRES_PASSWORD: ****
      POSTGRES_DB: imwallet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imwallet"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: imwallet-server
    environment:
      DATABASE_URL: postgresql://imwallet:****@postgres:5432/imwallet
      PORT: 3000
      SERVER_PWD: ****
      RUST_BACKTRACE: 1
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - rs-wallet-keys:/opt/rs-wallet/keys
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
  rs-wallet-keys: