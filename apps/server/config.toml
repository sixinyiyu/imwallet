# rs-wallet 主配置文件
# 环境相关配置可通过环境变量覆盖（DATABASE_URL, PORT 等）

[server]
port = 9000

[database]
type = "postgresql"
user_name = "postgres"
password = "****"                    # 实际密码请通过环境变量 DATABASE_PASSWORD 覆盖，勿提交真实密码
url = "****"  # 实际连接地址请通过环境变量 DATABASE_URL 覆盖，勿提交真实地址
pool_max_connections = 20
pool_min_connections = 5
pool_acquire_timeout_secs = 30

[fee]
rate = 0.005
mode = "DEDUCTED"               # DEDUCTED | EXTRA
tx_restrict_wallet = true

[service]
password = "****"        # 服务配置密码（请通过环境变量 SERVER_PWD 覆盖，勿提交真实密码）

[logging]
default_level = "info"           # trace | debug | info | warn | error

[security]
timestamp_window_secs = 300      # Ed25519 签名时间窗口
nonce_cache_capacity = 10000    # 防重放缓存大小

[admin]
route_prefix = "vault"             

[rsa]
private_key_path = "keys/rsa_private.pem"   # RSA 私钥文件路径（不存在时自动生成）
public_key_path  = "keys/rsa_public.pem"    # RSA 公钥文件路径（不存在时自动生成）

[cors]
# 允许的跨域来源列表（前端访问后端 API 的域名）
# permissive = true 时忽略此列表，回显请求 Origin（开发模式，生产环境务必设为 false）
# 不配置时使用默认值：["https://imwallet.dpdns.org", "http://localhost:8081", "http://localhost:19006", "http://localhost:3000"]
permissive = true
allowed_origins = [
    "https://imwallet.dpdns.org",
    "http://localhost:8081",
    "http://localhost:19006",
    "http://localhost:3000",
]