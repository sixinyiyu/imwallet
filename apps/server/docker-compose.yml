# rs-wallet Docker Compose 部署
# 迁移自 IMWallet docker-compose.yml

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: imwallet
      POSTGRES_USER: imwallet
      POSTGRES_PASSWORD: ${DB_PASSWORD:-CHANGE_ME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imwallet"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://imwallet:${DB_PASSWORD:-CHANGE_ME}@db:5432/imwallet
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pgdata: