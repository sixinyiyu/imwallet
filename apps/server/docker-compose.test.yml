version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: imwallet-db
    environment:
      POSTGRES_USER: imwallet
      POSTGRES_PASSWORD: imwallet_dev
      POSTGRES_DB: imwallet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imwallet"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
